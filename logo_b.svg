<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="gB1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F2DFA7"/>
      <stop offset="100%" style="stop-color:#8B6914"/>
    </linearGradient>
    <linearGradient id="gB2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8D5B0;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#A67C3D;stop-opacity:0.4"/>
    </linearGradient>
    <radialGradient id="bgB" cx="50%" cy="48%" r="52%">
      <stop offset="0%" style="stop-color:#181830"/>
      <stop offset="100%" style="stop-color:#06060C"/>
    </radialGradient>
    <filter id="glB1"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glB2"><feGaussianBlur stdDeviation="3.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glB3"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <circle cx="200" cy="200" r="195" fill="url(#bgB)"/>
  <circle cx="200" cy="200" r="186" fill="none" stroke="#B8860B" stroke-width="0.8" opacity="0.3"/>

  <!-- 版本B：道教符箓风格 + 趋势曲线 -->
  <!-- 天圆地方：外圆内方 -->
  <circle cx="200" cy="185" r="72" fill="none" stroke="url(#gB1)" stroke-width="1.5" opacity="0.5" filter="url(#glB1)"/>
  <!-- 内方（铜钱方孔/地方） -->
  <rect x="176" y="161" width="48" height="48" rx="3" fill="none" stroke="url(#gB1)" stroke-width="1.5" opacity="0.5" filter="url(#glB1)"/>
  
  <!-- 方孔内：道教"玄"字符号化（简化为两点一弧） -->
  <path d="M 188,180 C 195,175 205,175 212,180 C 205,190 195,190 188,185" 
    fill="none" stroke="#D4A94B" stroke-width="1.5" stroke-linecap="round" opacity="0.7" filter="url(#glB1)"/>
  <circle cx="195" cy="192" r="2" fill="#D4A94B" opacity="0.7"/>
  <circle cx="205" cy="192" r="2" fill="#D4A94B" opacity="0.7"/>
  
  <!-- 四角道教云纹（简化为小漩涡） -->
  <path d="M 165,150 C 162,147 165,143 168,145" fill="none" stroke="#C8963E" stroke-width="1" opacity="0.35" stroke-linecap="round"/>
  <path d="M 235,150 C 238,147 235,143 232,145" fill="none" stroke="#C8963E" stroke-width="1" opacity="0.35" stroke-linecap="round"/>
  <path d="M 165,220 C 162,223 165,227 168,225" fill="none" stroke="#C8963E" stroke-width="1" opacity="0.35" stroke-linecap="round"/>
  <path d="M 235,220 C 238,223 235,227 232,225" fill="none" stroke="#C8963E" stroke-width="1" opacity="0.35" stroke-linecap="round"/>
  
  <!-- 从底部升起的趋势曲线（穿过天圆地方） -->
  <path d="M 100,270 C 130,260 150,240 170,215 S 210,170 240,145 S 280,115 320,95" 
    fill="none" stroke="url(#gB2)" stroke-width="2" stroke-linecap="round" opacity="0.65" filter="url(#glB2)"/>
  <!-- 曲线终点光点 -->
  <circle cx="320" cy="95" r="4" fill="#F2DFA7" opacity="0.6" filter="url(#glB3)"/>
  <circle cx="320" cy="95" r="2" fill="#F2DFA7" opacity="0.9" filter="url(#glB1)"/>
  
  <!-- 星点装饰 -->
  <circle cx="100" cy="270" r="1.5" fill="#D4A94B" opacity="0.4"/>
  <circle cx="170" cy="215" r="1.5" fill="#D4A94B" opacity="0.5"/>
  <circle cx="240" cy="145" r="1.8" fill="#D4A94B" opacity="0.6"/>
  
  <text x="200" y="325" text-anchor="middle" font-family="'Noto Serif SC','STSong',Georgia,serif" font-size="28" font-weight="600" fill="url(#gB1)" letter-spacing="4" opacity="0.9">玄枢</text>
  <text x="200" y="352" text-anchor="middle" font-family="'Cormorant Garamond',Georgia,serif" font-size="12" fill="#B8860B" letter-spacing="6" opacity="0.5">A L P H A</text>
</svg>
