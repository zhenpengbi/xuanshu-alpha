<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="gA1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F7E8C4"/>
      <stop offset="50%" style="stop-color:#C8963E"/>
      <stop offset="100%" style="stop-color:#7A5518"/>
    </linearGradient>
    <linearGradient id="gA2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C8963E;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#F7E8C4;stop-opacity:0.7"/>
    </linearGradient>
    <radialGradient id="bgA" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1A1A2E"/>
      <stop offset="100%" style="stop-color:#070710"/>
    </radialGradient>
    <filter id="glA1"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glA2"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glA3"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <circle cx="200" cy="200" r="195" fill="url(#bgA)"/>
  <circle cx="200" cy="200" r="186" fill="none" stroke="#C8963E" stroke-width="1" opacity="0.35"/>
  
  <!-- 版本A：八卦罗盘 + 中心蜡烛图 -->
  <!-- 外圈八卦爻线 -->
  <g opacity="0.3" stroke="#C8963E" stroke-width="2" stroke-linecap="round">
    <!-- 乾☰ 上 -->
    <line x1="188" y1="85" x2="212" y2="85"/><line x1="188" y1="90" x2="212" y2="90"/><line x1="188" y1="95" x2="212" y2="95"/>
    <!-- 兑☱ 右上 -->
    <line x1="268" y1="118" x2="284" y2="130"/><line x1="270" y1="124" x2="286" y2="136"/><line x1="272" y1="128" x2="278" y2="132"/>
    <!-- 离☲ 右 -->
    <line x1="300" y1="188" x2="300" y2="212"/><line x1="306" y1="193" x2="306" y2="207"/><line x1="306" y1="188" x2="306" y2="192"/>
    <!-- 震☳ 右下 -->
    <line x1="268" y1="268" x2="282" y2="260"/><line x1="270" y1="262" x2="276" y2="258"/>
    <!-- 坤☷ 下 -->
    <line x1="190" y1="305" x2="198" y2="305"/><line x1="202" y1="305" x2="210" y2="305"/>
    <line x1="190" y1="310" x2="198" y2="310"/><line x1="202" y1="310" x2="210" y2="310"/>
    <!-- 艮☶ 左下 -->
    <line x1="118" y1="268" x2="132" y2="260"/>
    <!-- 坎☵ 左 -->
    <line x1="94" y1="193" x2="94" y2="207"/><line x1="88" y1="188" x2="88" y2="212"/>
    <!-- 巽☴ 左上 -->
    <line x1="118" y1="130" x2="132" y2="118"/>
  </g>
  
  <!-- 中心圆环（罗盘） -->
  <circle cx="200" cy="195" r="65" fill="none" stroke="url(#gA1)" stroke-width="1.2" opacity="0.5"/>
  <circle cx="200" cy="195" r="55" fill="none" stroke="url(#gA1)" stroke-width="0.6" opacity="0.3"/>
  
  <!-- 中心K线蜡烛图（上升趋势，3根阳线） -->
  <!-- 蜡烛1（左，较短） -->
  <rect x="175" y="200" width="6" height="20" fill="#C8963E" opacity="0.8" filter="url(#glA1)"/>
  <line x1="178" y1="195" x2="178" y2="225" stroke="#C8963E" stroke-width="1" opacity="0.7"/>
  <!-- 蜡烛2（中，中等） -->
  <rect x="190" y="185" width="7" height="25" fill="#D4A94B" opacity="0.85" filter="url(#glA1)"/>
  <line x1="193.5" y1="178" x2="193.5" y2="215" stroke="#D4A94B" stroke-width="1" opacity="0.75"/>
  <!-- 蜡烛3（右，最长，突破） -->
  <rect x="206" y="165" width="8" height="35" fill="#F2DFA7" opacity="0.9" filter="url(#glA2)"/>
  <line x1="210" y1="155" x2="210" y2="205" stroke="#F2DFA7" stroke-width="1.2" opacity="0.8"/>
  
  <!-- 上升箭头 -->
  <path d="M 222,170 L 230,155 L 225,155 L 232,140" fill="none" stroke="#F7E8C4" stroke-width="1.5" stroke-linecap="round" opacity="0.6" filter="url(#glA2)"/>
  
  <text x="200" y="330" text-anchor="middle" font-family="'Noto Serif SC','STSong',Georgia,serif" font-size="28" font-weight="600" fill="url(#gA1)" letter-spacing="4" opacity="0.9">玄枢</text>
  <text x="200" y="356" text-anchor="middle" font-family="'Cormorant Garamond',Georgia,serif" font-size="12" fill="#C8963E" letter-spacing="6" opacity="0.5">A L P H A</text>
</svg>
