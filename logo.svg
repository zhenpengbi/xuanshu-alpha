<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- 金色渐变 -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f7d774"/>
      <stop offset="50%" style="stop-color:#f0b90b"/>
      <stop offset="100%" style="stop-color:#d4a017"/>
    </linearGradient>
    <!-- 星光发光效果 -->
    <radialGradient id="starGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#f0b90b;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#f0b90b;stop-opacity:0"/>
    </radialGradient>
    <!-- 铜钱基座渐变 -->
    <linearGradient id="coinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a017;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#f0b90b;stop-opacity:0.15"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景圆（铜钱外圈） -->
  <circle cx="100" cy="100" r="92" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.4"/>
  <circle cx="100" cy="100" r="88" fill="none" stroke="url(#goldGrad)" stroke-width="0.5" opacity="0.2"/>
  
  <!-- 铜钱方孔（内方外圆，道教天圆地方） -->
  <rect x="85" y="85" width="30" height="30" rx="2" fill="none" stroke="url(#goldGrad)" stroke-width="1.2" opacity="0.25"/>
  
  <!-- 北斗七星连线（抽象为上升趋势线） -->
  <!-- 七星坐标：模拟北斗形状，整体呈上升趋势 -->
  <!-- 天枢→天璇→天玑→天权（斗身）→ 玉衡→开阳→摇光（斗柄） -->
  <polyline 
    points="35,140 55,128 72,135 88,120 112,95 140,72 168,55" 
    fill="none" 
    stroke="url(#goldGrad)" 
    stroke-width="1.8" 
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"
    opacity="0.85"
  />
  
  <!-- 七颗星（从天枢到摇光） -->
  <!-- 天枢（Dubhe）- 玄枢之名来源 -->
  <circle cx="35" cy="140" r="5" fill="url(#starGlow)"/>
  <circle cx="35" cy="140" r="2.5" fill="#f0b90b" filter="url(#glow)"/>
  
  <!-- 天璇（Merak） -->
  <circle cx="55" cy="128" r="4" fill="url(#starGlow)"/>
  <circle cx="55" cy="128" r="2" fill="#f0b90b" filter="url(#glow)"/>
  
  <!-- 天玑（Phecda） -->
  <circle cx="72" cy="135" r="4" fill="url(#starGlow)"/>
  <circle cx="72" cy="135" r="2" fill="#f0b90b" filter="url(#glow)"/>
  
  <!-- 天权（Megrez） -->
  <circle cx="88" cy="120" r="4" fill="url(#starGlow)"/>
  <circle cx="88" cy="120" r="2" fill="#f0b90b" filter="url(#glow)"/>
  
  <!-- 玉衡（Alioth） -->
  <circle cx="112" cy="95" r="4.5" fill="url(#starGlow)"/>
  <circle cx="112" cy="95" r="2.2" fill="#f0b90b" filter="url(#glow)"/>
  
  <!-- 开阳（Mizar） -->
  <circle cx="140" cy="72" r="4.5" fill="url(#starGlow)"/>
  <circle cx="140" cy="72" r="2.2" fill="#f0b90b" filter="url(#glow)"/>
  
  <!-- 摇光（Alkaid）- 斗柄末端，最亮 -->
  <circle cx="168" cy="55" r="6" fill="url(#starGlow)"/>
  <circle cx="168" cy="55" r="3" fill="#f7d774" filter="url(#glow)"/>
  
  <!-- 天枢星额外高亮标记（代表"玄枢"） -->
  <circle cx="35" cy="140" r="9" fill="none" stroke="#f0b90b" stroke-width="0.8" opacity="0.5">
    <animate attributeName="r" values="9;12;9" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.2;0.5" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- 底部文字 -->
  <text x="100" y="175" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="url(#goldGrad)" letter-spacing="3">玄枢 ALPHA</text>
</svg>
