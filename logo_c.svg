<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="gC1" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF0C8"/>
      <stop offset="40%" style="stop-color:#D4A94B"/>
      <stop offset="100%" style="stop-color:#6B4C0A"/>
    </linearGradient>
    <linearGradient id="gC2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D4A94B;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#F2DFA7;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#D4A94B;stop-opacity:0.3"/>
    </linearGradient>
    <radialGradient id="bgC" cx="50%" cy="48%" r="52%">
      <stop offset="0%" style="stop-color:#16162A"/>
      <stop offset="100%" style="stop-color:#08080E"/>
    </radialGradient>
    <radialGradient id="cGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#D4A94B;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#D4A94B;stop-opacity:0"/>
    </radialGradient>
    <filter id="glC1"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glC2"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glC3"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <circle cx="200" cy="200" r="195" fill="url(#bgC)"/>
  <circle cx="200" cy="200" r="187" fill="none" stroke="#C8963E" stroke-width="0.8" opacity="0.3"/>
  
  <!-- 版本C：道教法印/符文 + 山形走势 -->
  <!-- 中心光晕 -->
  <circle cx="200" cy="185" r="80" fill="url(#cGlow)"/>
  
  <!-- 三重同心圆（道教三清/三界） -->
  <circle cx="200" cy="185" r="75" fill="none" stroke="#C8963E" stroke-width="0.6" opacity="0.2"/>
  <circle cx="200" cy="185" r="55" fill="none" stroke="#C8963E" stroke-width="0.8" opacity="0.3"/>
  <circle cx="200" cy="185" r="35" fill="none" stroke="url(#gC1)" stroke-width="1.2" opacity="0.5" filter="url(#glC1)"/>
  
  <!-- 内圆中心：道教"无极"圆点 -->
  <circle cx="200" cy="185" r="5" fill="#D4A94B" opacity="0.6" filter="url(#glC2)"/>
  <circle cx="200" cy="185" r="2.5" fill="#FFF0C8" opacity="0.9"/>
  
  <!-- 四象（四方位标记，简化十字） -->
  <line x1="200" y1="145" x2="200" y2="128" stroke="#D4A94B" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
  <line x1="200" y1="225" x2="200" y2="242" stroke="#D4A94B" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
  <line x1="160" y1="185" x2="143" y2="185" stroke="#D4A94B" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
  <line x1="240" y1="185" x2="257" y2="185" stroke="#D4A94B" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
  
  <!-- 山形趋势线（金融"五浪上升"简化） -->
  <path d="M 80,260 L 120,240 L 140,252 L 180,210 L 200,222 L 250,160 L 270,172 L 330,105" 
    fill="none" stroke="url(#gC2)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" 
    opacity="0.7" filter="url(#glC2)"/>
  
  <!-- 波浪节点 -->
  <circle cx="80" cy="260" r="2" fill="#C8963E" opacity="0.5"/>
  <circle cx="180" cy="210" r="2" fill="#D4A94B" opacity="0.6"/>
  <circle cx="250" cy="160" r="2.5" fill="#D4A94B" opacity="0.7"/>
  <circle cx="330" cy="105" r="3.5" fill="#F2DFA7" opacity="0.8" filter="url(#glC3)"/>
  
  <!-- 终点光芒 -->
  <line x1="330" y1="95" x2="330" y2="115" stroke="#F2DFA7" stroke-width="0.6" opacity="0.5" filter="url(#glC1)"/>
  <line x1="320" y1="105" x2="340" y2="105" stroke="#F2DFA7" stroke-width="0.6" opacity="0.5" filter="url(#glC1)"/>
  
  <text x="200" y="328" text-anchor="middle" font-family="'Noto Serif SC','STSong',Georgia,serif" font-size="28" font-weight="600" fill="url(#gC1)" letter-spacing="4" opacity="0.9">玄枢</text>
  <text x="200" y="354" text-anchor="middle" font-family="'Cormorant Garamond',Georgia,serif" font-size="12" fill="#C8963E" letter-spacing="6" opacity="0.5">A L P H A</text>
</svg>
