name: 玄枢Alpha 每日数据更新

on:
  schedule:
    - cron: '30 8 * * 1-5'    # UTC 08:30 = 北京 16:30
  workflow_dispatch:           # 手动触发（GitHub Actions 页面）
  repository_dispatch:         # 外部 cron 兜底：POST /repos/{owner}/{repo}/dispatches
    types: [daily-update]

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
      - name: 安装 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install akshare==1.18.64 pandas numpy requests ta tabulate yfinance multitasking
      - name: 拉取行情
        run: python3 fetch_prices.py
      - name: 拉取60日历史净值
        run: python3 scripts/fetch_nav.py
      - name: 更新持仓日收益
        run: python3 scripts/update_nav.py
      - name: 组合净值曲线
        run: python3 data/portfolio_history.py
      - name: 计算技术指标
        run: python3 data/indicators.py
      - name: 生成买卖信号
        run: python3 data/signals.py
      - name: 新闻情绪分析
        run: python3 scripts/build_news_impact.py
      - name: 基金雷达扫描
        run: python3 scripts/fund_scanner.py
      - name: 主动基金诊断
        run: python3 scripts/active_fund_diagnose.py
      - name: 持仓止盈止损跟踪
        run: python3 scripts/position_tracker.py
      - name: 计算再平衡建议
        run: python3 data/rebalance.py
      - name: 组合风险度量
        run: python3 data/risk.py
      - name: 估值分位（7品类PE历史分位）
        run: python3 data/valuation.py
      - name: 提交并推送更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          if git diff --staged --quiet; then
            echo "数据无变化，跳过提交"
          else
            git commit -m "chore: 每日数据自动更新 $(date +%Y-%m-%d)"
            git push
          fi
