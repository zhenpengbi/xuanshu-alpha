name: 玄枢Alpha 每周策略回测

on:
  schedule:
    # 每周一 UTC 01:00（北京时间周一 09:00）
    - cron: '0 1 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 安装 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install akshare==1.18.64 pandas numpy requests ta tabulate yfinance multitasking

      - name: 拉取最新行情（回测需要最新价格基准）
        run: python3 fetch_prices.py

      - name: 运行策略回测引擎
        run: python3 backtest/backtest_engine.py

      - name: 提交并推送回测结果
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backtest/data/backtest.json
          if git diff --staged --quiet; then
            echo "回测数据无变化，跳过提交"
          else
            git commit -m "chore: 每周回测数据更新 $(date +%Y-%m-%d)"
            git push
          fi
